name: Release Executables (Nuitka)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target_name: linux-x64
            binary_name: svg2dxf
            asset_name: svg2dxf-linux-x64
          - os: macos-latest
            target_name: macos-x64
            binary_name: svg2dxf
            asset_name: svg2dxf-macos-x64
          - os: windows-2022
            target_name: windows-x64
            binary_name: svg2dxf.exe
            asset_name: svg2dxf-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install nuitka

      - name: Build executable with Nuitka
        shell: bash
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --follow-imports \
            --assume-yes-for-downloads \
            --output-dir=build \
            --output-filename=${{ matrix.binary_name }} \
            src/svg2dxf/cli.py

      - name: Package artifact (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "build/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          Copy-Item -Path "build\${{ matrix.binary_name }}" -Destination "dist\${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
